name: platform
root: ~/
tmux_options: "-u"

windows:
  # Manifest/chart/IaC editing with a scratch pane alongside
  - editor:
      layout: main-vertical
      panes:
        -

  # k9s for cluster browsing, kubectl scratchpad below
  - cluster:
      layout: main-horizontal
      panes:
        - k9s

  # Stern log tailing — two panes for different services/namespaces
  # Usage: stern -n <namespace> <pod-selector> or stern --selector app=<label>
  - logs:
      layout: tiled
      panes:
        - echo "Usage - stern -n <namespace> <pod-selector> or stern --selector app=<label>"
        - echo "Usage - stern -n <namespace> <pod-selector> or stern --selector app=<label>"

  - notes:
      root: "~/Library/Mobile Documents/iCloud~md~obsidian/Documents/notes"
      layout: 81e7,382x65,0,0[382x59,0,0,2,382x5,0,60,13
      panes:
        - nvim
        - ttoday
