# Go developer tools managed by mise via the `go:` backend.
#
# Replaces both the `go install ...@latest` loop in install.sh and the
# `go "..."` directives that used to live in the Brewfile, as well as the
# Go LSPs/linters that were previously installed as standalone brew formulae
# (gopls, golangci-lint, golangci-lint-langserver, gci, golines).

[tools]
# LSP + linters (previously brew formulae)
"go:golang.org/x/tools/gopls"                                = "latest"
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint"  = "latest"
"go:github.com/nametake/golangci-lint-langserver"            = "latest"
"go:github.com/daixiang0/gci"                                = "latest"

# Formatters & code generation
"go:mvdan.cc/gofumpt"                                        = "latest"
"go:golang.org/x/tools/cmd/goimports"                        = "latest"
"go:github.com/segmentio/golines"                            = "latest"
"go:github.com/fatih/gomodifytags"                           = "latest"
"go:github.com/abice/go-enum"                                = "latest"
"go:github.com/koron/iferr"                                  = "latest"
"go:github.com/josharian/impl"                               = "latest"
"go:github.com/tmc/json-to-struct"                           = "latest"
"go:go.uber.org/mock/mockgen"                                = "latest"
"go:github.com/cweill/gotests/gotests"                       = "latest"
"go:github.com/davidrjenni/reftools/cmd/fillswitch"          = "latest"
"go:github.com/abenz1267/gomvp"                              = "latest"

# Scaffolding / refactoring
"go:golang.org/x/tools/cmd/gonew"                            = "latest"
"go:golang.org/x/tools/cmd/gorename"                         = "latest"
"go:golang.org/x/tools/cmd/callgraph"                        = "latest"

# Test runners / output
"go:gotest.tools/gotestsum"                                  = "latest"
"go:github.com/onsi/ginkgo/v2/ginkgo"                        = "latest"
"go:github.com/kyoh86/richgo"                                = "latest"

# Debugging & security
"go:github.com/go-delve/delve/cmd/dlv"                       = "latest"
"go:golang.org/x/vuln/cmd/govulncheck"                       = "latest"

# CI / workflow linting
"go:github.com/rhysd/actionlint/cmd/actionlint"              = "latest"

# Personal
"go:github.com/davyj0nes/nothelp"                            = "latest"
# partner-validate intentionally omitted: no tagged releases. Install ad-hoc
# with `go install github.com/davyj0nes/partner-validate@latest` if needed.
